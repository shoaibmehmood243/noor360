<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Outer Radial Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DFCA85" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#A38230" />
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EEAD4" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
  </defs>

  <circle cx="50%" cy="50%" r="48" fill="url(#glow)" />

  <!-- Geometric Star Pattern (8-point Islamic Star) -->
  <g transform="translate(50, 50)">
    <!-- Square 1 -->
    <rect x="-24" y="-24" width="48" height="48" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" rx="4" />
    <!-- Square 2 rotated 45deg -->
    <rect x="-24" y="-24" width="48" height="48" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" rx="4" transform="rotate(45)" />
    
    <!-- Inner Octagon Details -->
    <polygon points="0,-18 13,-13 18,0 13,13 0,18 -13,13 -18,0 -13,-13" fill="none" stroke="url(#teal-grad)" stroke-width="1.5" />
    
    <!-- Central Sphere of Light (Noor) -->
    <circle cx="0" cy="0" r="8" fill="url(#gold-grad)" />
    <circle cx="0" cy="0" r="4" fill="#FFFFFF" />
  </g>
</svg>
